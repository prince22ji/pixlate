<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo Spring Intro</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:white;
}

.scene{
    width:100%;
    height:100%;
    position:relative;
}

.logo{
    position:absolute;
    top:50%;
    width:66px;
    height:66px;
    object-fit:contain;
    transform-origin:center center;
}

/* LEFT LOGO */

.logo-left{
    left:50%;
    margin-left:-66px;

    animation:
        leftSpring 3.5s forwards;
}

/* RIGHT LOGO */

.logo-right{
    left:50%;
    width:46px;
    height:46px;

    animation:
        rightSpring 3.5s forwards;
}

/* DIVIDER */

.divider{
    position:absolute;

    left:50%;
    top:50%;

    width:1px;
    height:22px;

    background:grey;

    transform:
        translate(-50%, -50%)
        scaleY(0);

    opacity:0;

    animation:
        dividerReveal 0.8s ease-out forwards;

    animation-delay:3.5s;
}

/* ========================= */
/* LEFT SPRING ANIMATION */
/* ========================= */

@keyframes leftSpring{

    /* offscreen */
    0%{
        opacity:0;
        transform:
            translate(-140vw,-50%)
            scaleX(1)
            scaleY(1);
    }

    /* accelerating */
    20%{
        opacity:1;
        transform:
            translate(-60vw,-50%)
            scaleX(1.30)
            scaleY(0.75);
    }

    /* high speed */
    45%{
        opacity:1;
        transform:
            translate(-25px,-50%)
            scaleX(1.40)
            scaleY(0.70);
    }

    /* close approach */
    65%{
        opacity:1;
        transform:
            translate(-15px,-50%)
            scaleX(1.05)
            scaleY(0.98);
    }

    /* rebound */
    80%{
        opacity:1;
        transform:
            translate(-35px,-50%)
            scaleX(1.08)
            scaleY(0.94);
    }

    /* final separation */
    100%{
        opacity:1;
        transform:
            translate(-28px,-50%)
            scaleX(1)
            scaleY(1);
    }
}

/* ========================= */
/* RIGHT SPRING ANIMATION */
/* ========================= */

@keyframes rightSpring{

    0%{
        opacity:0;
        transform:
            translate(140vw,-50%)
            scaleX(1)
            scaleY(1);
    }

    20%{
        opacity:1;
        transform:
            translate(60vw,-50%)
            scaleX(1.30)
            scaleY(0.75);
    }

    45%{
        opacity:1;
        transform:
            translate(25px,-50%)
            scaleX(1.40)
            scaleY(0.70);
    }

    65%{
        opacity:1;
        transform:
            translate(15px,-50%)
            scaleX(1.05)
            scaleY(0.98);
    }

    80%{
        opacity:1;
        transform:
            translate(35px,-50%)
            scaleX(1.08)
            scaleY(0.94);
    }

    100%{
        opacity:1;
        transform:
            translate(28px,-50%)
            scaleX(1)
            scaleY(1);
    }
}

/* ========================= */
/* DIVIDER */
/* ========================= */

@keyframes dividerReveal{

    0%{
        opacity:0;
        transform:
            translate(-50%,-50%)
            scaleY(0);
    }

    100%{
        opacity:1;
        transform:
            translate(-50%,-50%)
            scaleY(1);
    }
}

</style>
</head>

<body>

<div class="scene">

    <img
        src="./fortis-seeklogo.png"
        class="logo logo-left"
        alt="Logo 1">

    <div class="divider"></div>

    <img
        src="./IMG_1616.PNG"
        class="logo logo-right"
        alt="Logo 2">

</div>

</body>
</html>
